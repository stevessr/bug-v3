allowBuilds:
  # @google/genai does not need its optional postinstall in the browser build.
  # Keep it explicitly denied so pnpm can install non-interactively in CI.
  '@google/genai': false
  core-js: true
  protobufjs: true
  typeit: true
onlyBuiltDependencies:
  - core-js
  - electron
  - esbuild
  - protobufjs
  - vue-demi
