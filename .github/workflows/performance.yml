name: Extension performance guard

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit-test performance tooling
        run: pnpm test:performance

      - name: Build and enforce performance budgets
        run: pnpm perf

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extension-performance-audit
          path: dist/performance-audit.json
          if-no-files-found: ignore
